# This workflow will build a docker image and push it to Docker Hub
name: release_docker

on:
  workflow_call:
    inputs:
      dockerfile:
        required: true
        type: string
        description: "Path to the Dockerfile to build"
      image:
        required: true
        type: string
        description: "Name of the image to build"
      appendix_tag:
        required: false
        type: string
        description: "Tag suffix to add to every produced tag, e.g. -cpu"
        default: ""
      context:
        required: false
        type: string
        description: "Path to the build context"
        default: "./libs/infinity_emb"
      platforms:
        required: false
        type: string
        description: "Platforms to build for"
        default: "linux/amd64,linux/arm64"

jobs:
  docker:
    runs-on: ubuntu-latest
    environment:
      name: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: "./.github/actions/disk_cleanup"
        if: runner.os == 'Linux'
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          # suffix= appends appendix_tag to every generated tag
          flavor: |
            suffix=${{ inputs.appendix_tag }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Uncomment the following steps if you want to build and test the image locally
      # - name: Build for Test
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ${{ inputs.context }}
      #     file: ${{ inputs.dockerfile }}
      #     load: true
      #     tags: ${{ steps.meta.outputs.tags }}
      #
      # - name: Test
      #   # show that at least --help command is running
      #   run: |
      #     docker run --rm <test-tag> --help

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          # We can only build for the intersection of platforms supported by
          # QEMU and base python image, for now build only for
          # linux/amd64 and linux/arm64
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
